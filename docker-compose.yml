services:
  backend:
    build:
      context: ./backend
    ports:
      - "8765:8765"
    environment:
      # Examples:
      # MESH_ARGS=--serial /dev/ttyUSB0
      # MESH_ARGS=--tcp 192.168.1.100:4000
      # MESH_ARGS=--ble 12:34:56:78:90:AB
      - MESH_ARGS=${MESH_ARGS:-}
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
